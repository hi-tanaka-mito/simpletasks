<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMPLE TASKS</title>
<!-- Firebase compat SDK (auth + firestore). If offline/blocked or not configured, the app falls back to local storage automatically. -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<style>
/* ============================================================
   Theme variables (defaults = Mocha : black / brown / white)
   Overridden at runtime by the theme-color selector.
   ============================================================ */
:root{
  --bg:#f2f2f3;
  --panel:#ffffff;
  --ink:#20232a;
  --ink-soft:#7a7f8a;
  --line:#e0e1e5;
  --line-strong:#c9cbd2;
  --grad:linear-gradient(135deg,#1c1c1e 0%,#5a5c66 60%,#c3c6cf 100%);
  --grad-soft:linear-gradient(135deg,#eceef1 0%,#dcdfe6 100%);
  --accent:#4a4d57;
  --accent-ink:#26282f;
  --on-accent:#ffffff;   /* text colour on gradient/solid primary buttons */
  /* fixed neutral for logout / delete / × (always grey) */
  --grey:linear-gradient(135deg,#8f8f8f 0%,#bcbcbc 100%);
  --radius:14px;
  --shadow:0 6px 18px rgba(60,50,40,.14);
  font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",system-ui,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);}
body{padding:14px;-webkit-text-size-adjust:100%;}
/* Full HD: cap width & center so a whole month + all sections stay balanced on screen */
#appView{max-width:1680px;margin:0 auto;}

/* ---- unified button styling ---- */
button{
  font-family:inherit;border:none;cursor:pointer;border-radius:10px;
  padding:8px 14px;font-size:13px;font-weight:600;color:var(--accent-ink);
  background:var(--grad-soft);
  transition:transform .08s ease, box-shadow .15s ease, filter .15s ease;
  box-shadow:0 2px 6px rgba(80,70,60,.16);line-height:1.1;
}
button:hover{filter:brightness(1.03);transform:translateY(-1px);}
button:active{transform:translateY(0);}
button.primary{background:var(--grad);color:var(--on-accent);}
button.grey{background:var(--grey);color:#fff;}          /* logout / delete / × */
button.ghost{background:var(--grad-soft);color:var(--ink-soft);box-shadow:inset 0 0 0 1px var(--line);}
button.sm{padding:5px 9px;font-size:12px;border-radius:8px;}
button.active-filter{background:var(--grad);color:var(--on-accent);box-shadow:0 3px 9px rgba(60,50,40,.3);}

input,select,textarea{
  font-family:inherit;font-size:13px;color:var(--ink);
  border:1px solid var(--line-strong);border-radius:10px;padding:8px 10px;
  background:#fdfcfa;outline:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(120,90,70,.16);}
label.fld{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--ink-soft);font-weight:600;}

.hr-dash{border:none;border-top:1.5px dashed var(--line-strong);margin:10px 0;}
.hr-solid{border:none;border-top:1.5px solid var(--line);margin:10px 0;}

/* ============================================================
   Panels — title top-left, action button top-right aligned
   ============================================================ */
.panel{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px 16px;margin-bottom:12px;}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.panel-title{font-size:16px;font-weight:800;letter-spacing:.5px;color:var(--accent-ink);margin:0;}
/* add & open/close buttons share ONE size so they line up vertically */
.icon-btn{min-width:72px;height:34px;padding:0 12px;display:inline-flex;align-items:center;justify-content:center;}
.acc-body{margin-top:12px;}
.acc-collapsed .acc-body{display:none;}

/* ============================================================
   Header ①
   ============================================================ */
#appHeader .panel-title{font-size:22px;color:var(--accent-ink);}
.header-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.lang-seg{display:inline-flex;border-radius:9px;overflow:hidden;box-shadow:inset 0 0 0 1px var(--line);}
.lang-seg button{border-radius:0;box-shadow:none;padding:6px 10px;font-size:12px;}
.theme-pick{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-soft);font-weight:700;}
.theme-pick select{padding:6px 8px;font-size:12px;}
#whoami{font-size:12px;color:var(--ink-soft);font-weight:700;}

/* ============================================================
   Section ② : calendar/gantt (main) + right column
   ============================================================ */
.sec2{display:grid;grid-template-columns:1fr 300px;gap:14px;align-items:start;}
.sec2-left{display:flex;flex-direction:column;gap:14px;}
.right-col{display:flex;flex-direction:column;gap:14px;}

.nav-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px;}
.month-label{font-weight:800;color:var(--accent-ink);font-size:15px;padding:0 6px;}

/* ---- Calendar ---- */
.cal-wrap{margin-top:12px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--ink-soft);padding:4px 0;}
.cal-dow.sun{color:#c77;}
.cal-dow.sat{color:#77a;}
/* fixed (uniform) height so a whole month fits on-screen at Full HD; width is uniform via grid 1fr */
.cal-cell{height:clamp(52px,7.4vh,82px);min-height:0;overflow:hidden;border:1px solid var(--line);border-radius:10px;
  background:#fdfcfa;padding:3px;display:flex;flex-direction:column;gap:2px;cursor:pointer;}
.cal-cell.other{opacity:.4;}
.cal-cell.today{border-color:var(--accent);box-shadow:0 0 0 2px rgba(120,90,70,.25);}
.cal-cell.sel{background:var(--grad-soft);border-color:var(--accent);}
.cal-daynum{font-size:11px;font-weight:700;color:var(--ink-soft);}
.cal-strip{font-size:9px;color:#fff;border-radius:4px;padding:1px 3px;white-space:nowrap;
  overflow:hidden;text-overflow:clip;line-height:1.35;}

/* ---- Gantt ---- */
.gantt-wrap{margin-top:12px;display:grid;grid-template-columns:auto 1fr;border:1px solid var(--line);
  border-radius:12px;overflow:hidden;}
.gantt-names{background:var(--grad-soft);border-right:2px solid var(--line-strong);position:sticky;left:0;z-index:3;}
.gantt-scroll{overflow-x:auto;overflow-y:hidden;}
.gantt-name-cell{height:40px;display:flex;align-items:center;padding:0 10px;font-size:12px;font-weight:700;
  gap:6px;white-space:nowrap;border-bottom:1px solid var(--line);min-width:150px;max-width:220px;}
.gantt-head-cell{height:34px;}
.gantt-name-txt{overflow:hidden;text-overflow:ellipsis;}
.gantt-prog{margin-left:auto;font-size:10px;color:var(--accent-ink);font-weight:800;
  background:var(--grad-soft);border-radius:20px;padding:1px 7px;}
.gantt-timeline{display:inline-block;min-width:100%;}
.gantt-days{display:flex;height:34px;border-bottom:1px solid var(--line);}
.gantt-day{width:34px;flex:0 0 34px;text-align:center;font-size:9px;color:var(--ink-soft);
  border-right:1px dashed var(--line);display:flex;flex-direction:column;justify-content:center;line-height:1.2;cursor:pointer;}
.gantt-day.wknd{background:var(--grad-soft);}
.gantt-day.selday{background:var(--grad);color:var(--on-accent);box-shadow:inset 0 0 0 2px var(--accent);}
.gantt-day .dw{font-size:8px;opacity:.7;}
.gantt-body-row{display:flex;height:40px;border-bottom:1px solid var(--line);position:relative;}
.gantt-cell{width:34px;flex:0 0 34px;border-right:1px dashed var(--line);}
.gantt-cell.wknd{background:rgba(0,0,0,.02);}
/* planned = thin dotted line (no surrounding box) on TOP */
.bar-plan{position:absolute;top:9px;height:0;border-top:2px dotted var(--_c);}
/* actual = solid line BELOW */
.bar-actual{position:absolute;top:23px;height:6px;border-radius:6px;background:var(--_c);opacity:.92;}

/* ---- Day's Tasks & Memo ---- */
.day-task{display:flex;gap:8px;align-items:flex-start;padding:7px;border-radius:9px;background:#fdfcfa;
  border:1px solid var(--line);margin-bottom:6px;}
.dot{width:10px;height:10px;border-radius:50%;flex:0 0 10px;margin-top:3px;}
.day-task .tt{font-size:12px;font-weight:700;}
.day-task .meta{font-size:10px;color:var(--ink-soft);}
/* Day's Tasks status checkboxes (完了 / 途中 / 未実施) on the left */
.day-status{display:flex;flex-direction:column;gap:2px;flex:0 0 auto;}
.stat{font-size:9px;padding:1px 5px;border-radius:6px;border:1px solid var(--line-strong);
  background:#fff;color:var(--ink-soft);cursor:pointer;white-space:nowrap;line-height:1.5;
  box-shadow:none;font-weight:700;min-width:58px;text-align:left;}
.stat.on.done{background:#7bbf8a;color:#fff;border-color:#7bbf8a;}
.stat.on.wip{background:#e0b15f;color:#fff;border-color:#e0b15f;}
.stat.on.todo{background:#b0b0b0;color:#fff;border-color:#b0b0b0;}
.report-tools{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
/* Daily-report recipient settings modal (separate registration screen) */
.modal-overlay{position:fixed;inset:0;background:rgba(40,30,25,.42);display:flex;
  align-items:center;justify-content:center;z-index:50;padding:14px;}
.modal-card{background:var(--panel);border-radius:16px;box-shadow:var(--shadow);padding:18px;width:100%;max-width:440px;}
.modal-card textarea{resize:vertical;}
.memo-add{display:flex;gap:6px;}
.memo-add input{flex:1;}
.memo-list{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
.memo-item{display:flex;gap:6px;align-items:center;background:#fdfcfa;border:1px solid var(--line);
  border-radius:9px;padding:6px 8px;}
.memo-item .mtext{flex:1;font-size:12px;word-break:break-word;}
.memo-move{display:flex;flex-direction:column;gap:2px;}
.memo-move button{padding:0 6px;font-size:10px;line-height:1.4;min-width:22px;}

/* ============================================================
   Group setting
   ============================================================ */
.form-row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
.form-row .fld{flex:1;min-width:130px;}
.group-card{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px;background:#fdfcfa;}
.group-card h4{margin:0 0 6px;color:var(--accent-ink);font-size:14px;}
.member-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px dashed var(--line);font-size:12px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;background:var(--grad);color:var(--on-accent);}
.badge.soft{background:var(--grad-soft);color:var(--ink-soft);}

/* ============================================================
   Category
   ============================================================ */
.cat-list{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.cat-item{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center;
  border:1px solid var(--line);border-radius:10px;padding:8px;background:#fdfcfa;}
.cat-actions{display:flex;gap:6px;}
.swatch{width:34px;height:34px;border-radius:8px;border:2px solid #fff;box-shadow:0 0 0 1px var(--line-strong);cursor:pointer;}
.cat-add-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-top:12px;}
.palette{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;max-width:300px;}
.pal-chip{width:22px;height:22px;border-radius:6px;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px var(--line-strong);}
.pal-chip.sel{box-shadow:0 0 0 2px var(--accent);}
.color-tuner{display:flex;gap:8px;align-items:center;margin-top:8px;}

/* ============================================================
   Task setting (④) — two rows, flex-wrap so buttons never overflow
   ============================================================ */
.task-form{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.tf-row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
/* equal fixed width -> plan/actual start match, plan/actual end match, yyyy/mm/dd fully visible */
.fld.date{flex:0 0 150px;}
.date-inp{width:100%;min-width:140px;}
.fld.narrow{flex:0 0 116px;}
.fld.wide{flex:1 1 220px;min-width:150px;}
.tf-btns{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;}
.task-list{margin-top:14px;display:flex;flex-direction:column;gap:6px;}
.tl-item{display:flex;gap:8px;align-items:center;border:1px solid var(--line);border-radius:10px;
  padding:8px;background:#fdfcfa;font-size:12px;cursor:pointer;flex-wrap:wrap;}
.tl-item.sel{border-color:var(--accent);box-shadow:0 0 0 2px rgba(120,90,70,.2);}
.tl-item .grow{flex:1;min-width:120px;}
.tl-tag{font-size:10px;padding:2px 7px;border-radius:20px;color:#fff;font-weight:700;}
.tl-vis{font-size:10px;color:var(--ink-soft);font-weight:700;}

/* ============================================================
   Auth
   ============================================================ */
#authView{max-width:400px;margin:8vh auto;}
.auth-card{background:var(--panel);border-radius:18px;box-shadow:var(--shadow);padding:28px;}
.auth-logo{font-size:26px;font-weight:900;text-align:center;margin-bottom:4px;color:var(--accent-ink);}
.auth-sub{text-align:center;color:var(--ink-soft);font-size:12px;margin-bottom:18px;}
.auth-tabs{display:flex;gap:8px;margin-bottom:16px;}
.auth-tabs button{flex:1;}
.auth-form{display:flex;flex-direction:column;gap:10px;}
.auth-form input{width:100%;}
.err{color:#b06a5a;font-size:12px;min-height:16px;}
.hint{font-size:11px;color:var(--ink-soft);text-align:center;margin-top:10px;}
.auth-top{display:flex;justify-content:flex-end;margin-bottom:10px;}
.auth-switch{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:6px;}
.auth-switch a{color:var(--accent);font-weight:700;cursor:pointer;text-decoration:underline;}

.hidden{display:none !important;}

/* ============================================================
   RESPONSIVE
   Intermediate widths: task buttons wrap (flex-wrap already);
   below 860: single column, mobile-portrait one-screen friendly.
   ============================================================ */
@media (max-width:1080px){
  /* keep task buttons on their own line before they can overflow */
  .tf-btns{flex:1 1 100%;justify-content:flex-start;}
}

@media (max-width:860px){

  body{
    padding:8px;
  }

  .sec2{
    grid-template-columns:1fr;
  }

  .cat-item{
    grid-template-columns:30px 1fr;
  }

  .cat-item .cat-actions{
    grid-column:1 / -1;
    justify-content:flex-end;
  }

  .cat-add-row{
    flex-direction:column;
    align-items:stretch;
  }

  .cat-add-row .fld,
  .cat-add-row input{
    width:100%;
  }

  .panel-title{
    font-size:15px;
  }

  .gantt-name-cell{
    min-width:120px;
    max-width:150px;
  }

  /* 日付入力を横2列ではなく安全幅に */
  .fld.date{
    flex:1 1 100%;
    min-width:0;
  }

  .fld.narrow{
    flex:1 1 100%;
    min-width:0;
  }

  .fld.wide{
    flex:1 1 100%;
    min-width:0;
  }

  .date-inp{
    width:100%;
    min-width:0;
    max-width:100%;
    box-sizing:border-box;
  }

  .tf-btns{
    width:100%;
  }

  .tf-btns button{
    flex:1;
  }
}

@media (max-width:480px){

  .month-label{
    font-size:13px;
  }

  .cal-daynum{
    font-size:10px;
  }

  .header-actions{
    gap:6px;
  }

  /* ==========================
     iPhone縦表示対策
     ========================== */

  .task-form{
    width:100%;
    margin:0;
    padding:0;
  }

  .task-form .tf-row{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:stretch;
    justify-content:flex-start;
    gap:10px;
    margin:0;
    padding:0;
  }

  .task-form .fld,
  .task-form .fld.date,
  .task-form .fld.narrow,
  .task-form .fld.wide{
    width:100%;
    min-width:0;
    max-width:100%;
    flex:none;
    margin:0;
    padding:0;
    align-self:stretch;
  }

  .task-form label{
    text-align:left;
    width:100%;
    overflow:hidden;
  }

  /* ==========================
     高さ統一
     ========================== */

  .task-form input,
  .task-form select,
  .task-form button{
    width:100%;
    height:44px;
    min-height:44px;
    max-width:100%;
    margin:0;
    box-sizing:border-box;
    font-size:16px;
  }

  .task-form textarea{
    width:100%;
    min-height:88px;
    height:auto;
    max-width:100%;
    box-sizing:border-box;
    font-size:16px;
    padding:10px 12px;
  }

  /* ==========================
     Safari Date対策
     ========================== */

  .task-form input[type="date"]{
    width:100%;
    height:44px;
    min-height:44px;
    max-width:100%;
    min-width:0;

    box-sizing:border-box;

    appearance:none;
    -webkit-appearance:none;

    font-size:16px;
    padding:0 12px;
  }

  .date-inp{
    width:100%;
    height:44px;
    min-height:44px;
    max-width:100%;
    min-width:0;

    box-sizing:border-box;
  }

  .task-form select{
    padding:0 12px;
  }

  .task-form input{
    padding:0 12px;
  }

  #tfGroupRow{
    width:100%;
    margin:0;
    padding:0;
  }

  #tfGroupRow .fld{
    width:100%;
    max-width:100%;
    flex:none;
  }

  #tfGroup{
    width:100%;
  }

  /* ==========================
     ボタン縦並び
     ========================== */

  .task-form .tf-btns{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:8px;
    margin:0;
    padding:0;
  }

  .task-form .tf-btns button{
    width:100%;
    height:44px;
    min-height:44px;
    flex:none;

    display:flex;
    align-items:center;
    justify-content:center;

    margin:0;
  }

  /* 強制左寄せ */

  .fld{
    min-width:0 !important;
  }

  .task-form .fld{
    flex:0 0 auto !important;
  }
}
</style>
</head>
<body>

<!-- ============================= AUTH ============================= -->
<div id="authView">
  <div class="auth-card">
    <div class="auth-top">
      <div class="lang-seg">
        <button id="aLangJa" class="ghost" onclick="setLang('ja')">JPN</button>
        <button id="aLangEn" class="ghost" onclick="setLang('en')">ENG</button>
      </div>
    </div>
    <div class="auth-logo">SIMPLE TASKS</div>
    <div class="auth-sub" data-i18n="authSub"></div>
    <div id="loginForm" class="auth-form">
      <input id="loginUser" data-i18n-ph="phUserOrEmail">
      <input id="loginPass" type="password" data-i18n-ph="phPass">
      <div class="err" id="loginErr"></div>
      <button class="primary" data-i18n="login" onclick="doLogin()"></button>
      <div class="auth-switch"><span data-i18n="noAccount"></span> <a onclick="switchAuth('reg')" data-i18n="goSignup"></a></div>
    </div>

    <div id="regForm" class="auth-form hidden">
      <input id="regUser" data-i18n-ph="phUser">
      <input id="regEmail" type="email" data-i18n-ph="phEmail">
      <input id="regPass" type="password" data-i18n-ph="phPass2">
      <div class="err" id="regErr"></div>
      <button class="primary" data-i18n="createAcct" onclick="doRegister()"></button>
      <div class="auth-switch"><span data-i18n="haveAccount"></span> <a onclick="switchAuth('login')" data-i18n="goLogin"></a></div>
    </div>
    <div class="hint" data-i18n="authHint"></div>
  </div>
</div>

<!-- ============================= APP ============================= -->
<div id="appView" class="hidden">

  <!-- ① Header -->
  <div class="panel" id="appHeader">
    <div class="panel-head">
      <h1 class="panel-title">SIMPLE TASKS</h1>
      <div class="header-actions">
        <div class="theme-pick">
          <span data-i18n="theme"></span>
          <select id="themeSelect" onchange="applyTheme(this.value)"></select>
        </div>
        <div class="lang-seg">
          <button id="langJa" class="ghost" onclick="setLang('ja')">JPN</button>
          <button id="langEn" class="ghost" onclick="setLang('en')">ENG</button>
        </div>
        <span id="whoami"></span>
        <button class="grey icon-btn" data-i18n="logout" onclick="doLogout()"></button>
      </div>
    </div>
  </div>

  <!-- ② Calendar/Gantt + Day tasks + Memo -->
  <div class="sec2">
    <div class="sec2-left">
      <!-- ②-1 Calendar / Gantt -->
      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title" id="viewTitle">Calender</h2>
          <button class="primary icon-btn" id="viewToggle" onclick="toggleView()">Gantt Chart</button>
        </div>
        <div class="nav-row">
          <button class="ghost sm" data-i18n="prevM" onclick="shiftMonth(-1)"></button>
          <button class="ghost sm" data-i18n="thisM" onclick="thisMonth()"></button>
          <button class="ghost sm" data-i18n="nextM" onclick="shiftMonth(1)"></button>
          <span class="month-label" id="monthLabel"></span>
        </div>
        <div class="nav-row" id="visFilterRow">
          <button class="sm" data-vis="group" data-i18n="fGroup" onclick="setVisFilter('group')"></button>
          <button class="sm" data-vis="me" data-i18n="fMe" onclick="setVisFilter('me')"></button>

          </div>
          <div id="dayTasks"></div>
        </div>
      </div>

      <div class="panel" id="memoPanel">

          <h2 class="panel-title" data-i18n="memo">Memo</h2>

        </div>

    </div>

        </label>
        <button class="primary" data-i18n="invite" onclick="inviteMember()"></button>

      <div id="groupList"></div>

async function doRegister(){
  const u=regUser.value.trim(),e=regEmail.value.trim(),p=regPass.value;
  const err=document.getElementById('regErr'); err.textContent='';
  if(!u||!p){err.textContent=t('aRegNeed');return;}
  if(p.length<4){err.textContent=t('aRegLen');return;}
  if(FB.on){                                              /* ---- Firebase auth ---- */
    if(!e){err.textContent=t('aNeedEmail');return;}
    try{
      const cred=await FB.auth.createUserWithEmailAndPassword(e,p);
      FB.manual=true; await fbPull(); FB.ready=true;
      DB.users[u]={username:u,email:e,uid:cred.user.uid};
      DB.catsByUser[u]=DB.catsByUser[u]||defaultCats();
      DB.memosByUser[u]=DB.memosByUser[u]||[]; DB.reportCfgByUser[u]=DB.reportCfgByUser[u]||{};
      await fbPush(); enterApp(u);
    }catch(ex){ err.textContent=fbErr(ex); }
    return;
  }
  if(DB.users[u]){err.textContent=t('aRegDup');return;}   /* ---- local mode ---- */
  DB.users[u]={username:u,email:e,pass:hash(p)};
  DB.catsByUser[u]=defaultCats();
  DB.memosByUser[u]=[]; saveDB(); enterApp(u);
}
async function doLogin(){
  const id=loginUser.value.trim(), p=loginPass.value;
  const err=document.getElementById('loginErr'); err.textContent='';
  if(FB.on){                                              /* ---- Firebase auth ---- */
    try{
      let email=id;
      if(!id.includes('@')){                              /* resolve username -> email */
        await fbPull();
        const rec=DB.users[id];
        if(rec&&rec.email) email=rec.email; else { err.textContent=t('aLoginErr'); return; }
      }
      FB.manual=true;
      const cred=await FB.auth.signInWithEmailAndPassword(email,p);
      await fbEnter(cred.user);
    }catch(ex){ err.textContent=fbErr(ex); }
    return;
  }
  let rec=DB.users[id];                                   /* ---- local mode ---- */
  if(!rec) rec=Object.values(DB.users).find(u=>u.email&&u.email.toLowerCase()===id.toLowerCase());
  if(!rec||rec.pass!==hash(p)){err.textContent=t('aLoginErr');return;}
  enterApp(rec.username);
}

function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseD(s){if(!s)return null;const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function stripT(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function renderMainView(){
  document.getElementById('monthLabel').textContent=LANG==='ja'?(curY+'年 '+(curM+1)+'月'):((curM+1)+'/'+curY);

function renderCalendar(){
  const dow=LANG==='ja'?['日','月','火','水','木','金','土']:['Su','Mo','Tu','We','Th','Fr','Sa'];
  document.getElementById('calDow').innerHTML=dow.map((d,i)=>
    `<div class="cal-dow ${i===0?'sun':''}${i===6?'sat':''}">${d}</div>`).join('');
  const grid=document.getElementById('calGrid');
  const first=new Date(curY,curM,1), start=new Date(curY,curM,1-first.getDay());
  const todayStr=fmt(new Date()), tasks=visibleTasks();
  let html='';
  for(let i=0;i<42;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const ds=fmt(d), other=d.getMonth()!==curM;
    const dayTasks=tasks.filter(tk=>{
      const s=parseD(tk.pStart)||parseD(tk.aStart), e=parseD(tk.pEnd)||parseD(tk.aEnd)||s;
      if(!s)return false; return stripT(d)>=stripT(s)&&stripT(d)<=stripT(e||s);});
    let strips=dayTasks.slice(0,3).map(tk=>{
      const who=tk.owner!==ME?`${tk.owner}: `:'';
      return `<div class="cal-strip" style="background:${taskColor(tk)}">${esc(who+tk.content)}</div>`;}).join('');
    if(dayTasks.length>3)strips+=`<div class="cal-strip" style="background:var(--accent)">+${dayTasks.length-3}</div>`;
    html+=`<div class="cal-cell ${other?'other':''} ${ds===todayStr?'today':''} ${ds===selDate?'sel':''}"
      onclick="selectDay('${ds}')"><div class="cal-daynum">${d.getDate()}</div>${strips}</div>`;
  }
  grid.innerHTML=html;
}
function renderGantt(){
  const names=document.getElementById('ganttNames'), tl=document.getElementById('ganttTimeline');
  const dim=new Date(curY,curM+1,0).getDate();
  const mStart=new Date(curY,curM,1), mEnd=new Date(curY,curM,dim);
  const tasks=visibleTasks().filter(tk=>{
    const s=parseD(tk.pStart)||parseD(tk.aStart), e=parseD(tk.pEnd)||parseD(tk.aEnd)||s;
    if(!s)return false; return !(stripT(e||s)<mStart||stripT(s)>mEnd);});
  let nh=`<div class="gantt-head-cell gantt-name-cell" style="color:var(--ink-soft)">${t('taskCol')}</div>`;
  tasks.forEach(tk=>{
    const who=tk.owner!==ME?` <span style="color:var(--ink-soft)">(${esc(tk.owner)})</span>`:'';
    nh+=`<div class="gantt-name-cell">
      <span class="dot" style="background:${taskColor(tk)};margin-top:0"></span>
      <span class="gantt-name-txt">${esc(tk.content)}${who}</span>
      <span class="gantt-prog">${tk.progress||0}%</span></div>`;});
  names.innerHTML=nh;
  const dw=LANG==='ja'?['日','月','火','水','木','金','土']:['S','M','T','W','T','F','S'];
  let head='<div class="gantt-days">';
  for(let dd=1;dd<=dim;dd++){const wk=new Date(curY,curM,dd).getDay();
    const ds=curY+'-'+String(curM+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
    head+=`<div class="gantt-day ${wk===0||wk===6?'wknd':''} ${ds===selDate?'selday':''}" onclick="selectDay('${ds}')"><span>${dd}</span><span class="dw">${dw[wk]}</span></div>`;}
  head+='</div>';
  let rows='';
  tasks.forEach(tk=>{
    let cells='';
    for(let dd=1;dd<=dim;dd++){const wk=new Date(curY,curM,dd).getDay();
      cells+=`<div class="gantt-cell ${wk===0||wk===6?'wknd':''}"></div>`;}
    const col=taskColor(tk);
    const bp=barStyle(tk.pStart,tk.pEnd,dim), ba=barStyle(tk.aStart,tk.aEnd,dim);
    const planEl=bp?`<div class="bar-plan" style="--_c:${col};left:${bp.left}px;width:${bp.w}px"></div>`:'';
    const actEl=ba?`<div class="bar-actual" style="--_c:${col};left:${ba.left}px;width:${ba.w}px"></div>`:'';
    rows+=`<div class="gantt-body-row">${cells}${planEl}${actEl}</div>`;});
  tl.innerHTML=head+rows; tl.style.width=(dim*34)+'px';
}
function barStyle(sStr,eStr,dim){
  const cw=34; let s=parseD(sStr), e=parseD(eStr)||s;
  if(!s&&!e)return null; if(!s)s=e; if(!e)e=s; s=stripT(s); e=stripT(e);
  const mStart=new Date(curY,curM,1), mEnd=new Date(curY,curM,dim);
  if(e<mStart||s>mEnd)return null;
  const sd=(s<mStart)?1:s.getDate(), ed=(e>mEnd)?dim:e.getDate();
  return {left:(sd-1)*cw+3, w:Math.max((ed-sd+1)*cw-6,cw-6)};
}

function sendDailyReport(){
  const day=selDate||fmt(new Date()), d=parseD(day);
  const cfg=DB.reportCfgByUser[ME]||{};
  const tasks=DB.tasks.filter(tk=>tk.owner===ME).filter(tk=>{
    const s=parseD(tk.pStart)||parseD(tk.aStart), e=parseD(tk.pEnd)||parseD(tk.aEnd)||s;
    if(!s)return false; return stripT(d)>=stripT(s)&&stripT(d)<=stripT(e||s);});
  const grp={done:[],wip:[],todo:[]};
  tasks.forEach(tk=>grp[tk.status||'todo'].push(tk));
  const nl='\r\n';
  /* 完了 → 途中 → 未実施 の順。進捗%は載せない */
  const line=(tk)=>{const c=catById(tk.catId);
    return '- '+tk.content+(c?'（'+c.name+'）':'')+(tk.memo?' / '+tk.memo:'');};
  const sec=(labelKey,arr)=>'【'+t(labelKey)+'】'+nl+(arr.map(line).join(nl)||'-');
  const tasksBlock=sec('statDone',grp.done)+nl+nl+sec('statWip',grp.wip)+nl+nl+sec('statTodo',grp.todo);
  /* 登録した本文（定型文）→ その日のtasks の順に合成 */
  let body='';
  if(cfg.bodyTemplate) body+=cfg.bodyTemplate+nl+nl;
  body+=tasksBlock;
  if(cfg.signature) body+=nl+nl+cfg.signature;
  /* 件名は「【日報】氏名　日付」。subject= の文字は入らない */
  const sp=LANG==='ja'?'　':' ';
  _rpSubject='【'+(LANG==='ja'?'日報':'Daily Report')+'】'+ME+sp+day.replaceAll('-','/');
  _rpTo=cfg.to||''; _rpCc=cfg.cc||'';
  document.getElementById('rpSubjectView').value=_rpSubject;
  document.getElementById('rpBody').value=body;
  document.getElementById('rpNote').textContent=_rpTo?'':t('rNoTo');
  document.getElementById('reportPreviewModal').classList.remove('hidden');
}
function closeReportPreview(){document.getElementById('reportPreviewModal').classList.add('hidden');}
/* standard, compatible mailto: recipients comma-joined & unencoded, subject/body as params */
function buildMailto(){
  const to=(_rpTo||'').split(/[;,]/).map(s=>s.trim()).filter(Boolean).join(',');
  const cc=(_rpCc||'').split(/[;,]/).map(s=>s.trim()).filter(Boolean).join(',');
  const body=document.getElementById('rpBody').value;
  let q='subject='+encodeURIComponent(_rpSubject)+'&body='+encodeURIComponent(body);
  if(cc) q+='&cc='+encodeURIComponent(cc);
  return 'mailto:'+to+'?'+q;
}
function openMailer(){ window.location.href=buildMailto(); }
function copyReport(){
  const text=_rpSubject+'\r\n\r\n'+document.getElementById('rpBody').value;
  const done=()=>{document.getElementById('rpNote').textContent=t('rCopied');};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  }else fallbackCopy(text,done);
}
function fallbackCopy(text,done){
  try{const ta=document.getElementById('rpBody');const old=ta.value;ta.value=text;ta.focus();ta.select();
    document.execCommand('copy');ta.value=old;done();}catch(_){}
}

/* =====================================================================
   Memo
   ===================================================================== */
function addMemo(){const v=memoInput.value.trim();if(!v)return;
  const l=DB.memosByUser[ME]; if(l.length>=20){alert(t('aMemoMax'));return;}
  l.push(v);memoInput.value='';saveDB();renderMemos();}
function delMemo(i){DB.memosByUser[ME].splice(i,1);saveDB();renderMemos();}
function moveMemo(i,dir){const l=DB.memosByUser[ME];const j=i+dir;if(j<0||j>=l.length)return;
  [l[i],l[j]]=[l[j],l[i]];saveDB();renderMemos();}
function renderMemos(){
  const l=DB.memosByUser[ME]||[];
  document.getElementById('memoCount').textContent=l.length+'/20';
  document.getElementById('memoList').innerHTML=l.map((m,i)=>`
    <div class="memo-item"><div class="memo-move">
      <button class="ghost" onclick="moveMemo(${i},-1)">▲</button>
      <button class="ghost" onclick="moveMemo(${i},1)">▼</button></div>
      <div class="mtext">${esc(m)}</div>
      <button class="grey sm" onclick="delMemo(${i})">×</button></div>`).join('');
}

/* =====================================================================
   Groups
   ===================================================================== */
function createGroup(){const n=newGroupName.value.trim();if(!n)return;
  const id=uid(); DB.groups[id]={id,name:n,creator:ME,admins:[ME],members:[ME]};
  newGroupName.value='';saveDB();renderGroups();refreshGroupSelects();}
function inviteMember(){const u=inviteUser.value.trim(),gid=inviteGroup.value;if(!u||!gid)return;
  const g=DB.groups[gid];
  if(!g.admins.includes(ME)){alert(t('aInviteAdmin'));return;}
  if(!DB.users[u]){alert(t('aNoUser'));return;}
  if(g.members.includes(u)){alert(t('aAlreadyMember'));return;}
  g.members.push(u);inviteUser.value='';saveDB();renderGroups();}
function removeMember(gid,u){const g=DB.groups[gid];
  if(!g.admins.includes(ME)){alert(t('aRemoveAdmin'));return;}
  if(u===g.creator){alert(t('aCantRemoveCreator'));return;}
  g.members=g.members.filter(m=>m!==u);g.admins=g.admins.filter(m=>m!==u);saveDB();renderGroups();}
function promote(gid,u){const g=DB.groups[gid];
  if(!g.admins.includes(ME)){alert(t('aPromoteAdmin'));return;}
  if(!g.admins.includes(u))g.admins.push(u);saveDB();renderGroups();}
function demote(gid,u){const g=DB.groups[gid];
  if(!g.admins.includes(ME))return;
  if(u===g.creator){alert(t('aCantChangeCreator'));return;}
  g.admins=g.admins.filter(m=>m!==u);saveDB();renderGroups();}
function renderGroups(){
  const box=document.getElementById('groupList'), gs=myGroups();
  if(!gs.length){box.innerHTML=`<div style="color:var(--ink-soft);font-size:12px;">${t('noGroup')}</div>`;return;}
  box.innerHTML=gs.map(g=>{
    const iAmAdmin=g.admins.includes(ME);
    const members=g.members.map(m=>{
      const admin=g.admins.includes(m), creator=m===g.creator; let ctrl='';
      if(iAmAdmin&&m!==ME){
        ctrl+=admin?`<button class="ghost sm" onclick="demote('${g.id}','${m}')">${t('demote')}</button>`
                   :`<button class="primary sm" onclick="promote('${g.id}','${m}')">${t('promote')}</button>`;
        if(!creator)ctrl+=`<button class="grey sm" onclick="removeMember('${g.id}','${m}')">${t('remove')}</button>`;}
      const tag=creator?`<span class="badge">${t('creator')}</span>`
              :(admin?`<span class="badge">${t('admin')}</span>`:`<span class="badge soft">${t('member')}</span>`);
      return `<div class="member-row"><span>${esc(m)}</span>${tag}<span style="flex:1"></span>${ctrl}</div>`;}).join('');
    const cnt=g.members.length+(LANG==='ja'?'名':'');
    return `<div class="group-card"><h4>${esc(g.name)} <span style="font-size:11px;color:var(--ink-soft)">(${cnt})</span></h4>${members}</div>`;
  }).join('');
}
function refreshGroupSelects(){
  const opts=myGroups().map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join('');
  document.getElementById('inviteGroup').innerHTML=opts||'<option value=""></option>';
  document.getElementById('tfGroup').innerHTML=opts||'<option value=""></option>';
}

/* =====================================================================
   Categories + palette / tuner
   ===================================================================== */
const PALETTE=[
  // pastel
  '#e9d8c3','#d8c4a9','#c9b7d6','#f2cdd6','#cfe0c9','#c3d6e8','#efe1b8','#dce8c2',
  // solid (black/brown/white family + accents)
  '#3b2f2a','#6b4f31','#8a6d57','#b08a5c','#5a5c66','#8f8f8f','#c3c6cf','#e8e0d3',
  // extra hues
  '#7a5c48','#9c7a4e','#c96a86','#3f7a55','#2f6fed','#a9b7cf','#b5546f','#4a4d57'
];
let palTarget='new', palColor='#8a6d57';
function openPalette(target){
  palTarget=target; document.getElementById('paletteBox').classList.remove('hidden');
  const cur=target==='new'?palColor:(catById(target)?.color||'#8a6d57');
  document.getElementById('colorTuner').value=toHex(cur); renderPalette(cur);
  const p=document.getElementById('catPanel');
  if(p.classList.contains('acc-collapsed')){p.classList.remove('acc-collapsed');refreshAccLabels();}
}
function closePalette(){document.getElementById('paletteBox').classList.add('hidden');}
function renderPalette(cur){
  document.getElementById('paletteChips').innerHTML=PALETTE.map(c=>
    `<div class="pal-chip ${toHex(c)===toHex(cur)?'sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
}
function pickColor(c){applyColor(c);renderPalette(c);document.getElementById('colorTuner').value=toHex(c);}
function pickTuner(){applyColor(document.getElementById('colorTuner').value);}
function applyColor(c){
  if(palTarget==='new'){palColor=c;document.getElementById('newCatSwatch').style.background=c;}
  else{const cat=catById(palTarget);if(cat){cat.color=c;saveDB();renderCategories();renderCatFilter();renderMainView();renderDayTasks();}}
}
function toHex(c){if(/^#[0-9a-fA-F]{6}$/.test(c))return c.toLowerCase();
  const ctx=document.createElement('canvas').getContext('2d');ctx.fillStyle=c;return ctx.fillStyle;}
function addCategory(){const n=newCatName.value.trim();if(!n)return;
  if(myCats().length>=10){alert(t('aCatMax'));return;}
  myCats().push({id:uid(),name:n,color:palColor});newCatName.value='';saveDB();
  renderCategories();renderCatFilter();refreshTaskCatSelect();renderMainView();}
function delCategory(id){
  if(myCats().length<=1){alert(t('aCatMin'));return;}
  if(!confirm(t('aCatDel')))return;
  DB.catsByUser[ME]=myCats().filter(c=>c.id!==id);
  DB.tasks.forEach(tk=>{if(tk.owner===ME&&tk.catId===id)tk.catId=myCats()[0].id;});
  if(catFilter===id)catFilter='all';
  saveDB();renderCategories();renderCatFilter();refreshTaskCatSelect();renderMainView();renderDayTasks();}
function renderCategories(){
  document.getElementById('catList').innerHTML=myCats().map(c=>`
    <div class="cat-item">
      <div class="swatch" style="background:${c.color}" onclick="openPalette('${c.id}')"></div>
      <input value="${esc(c.name)}" onchange="renameInline('${c.id}',this.value)">
      <div class="cat-actions">
        <button class="ghost sm" onclick="openPalette('${c.id}')">${t('color')}</button>
        <button class="grey sm" onclick="delCategory('${c.id}')">${t('del')}</button>
      </div></div>`).join('');
}
function renameInline(id,v){const cat=catById(id);if(cat){cat.name=v.trim()||cat.name;saveDB();
  renderCatFilter();refreshTaskCatSelect();renderMainView();renderDayTasks();}}

/* =====================================================================
   Task setting
   ===================================================================== */
let editingId=null;
function contrastText(hex){
  const h=toHex(hex).replace('#','');
  const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
  return (0.299*r+0.587*g+0.114*b)>150?'#222222':'#ffffff';
}
/* colour the closed select to match the chosen category */
function styleCatSelect(){
  const sel=document.getElementById('tfCat'), c=catById(sel.value);
  if(c){sel.style.background=c.color;sel.style.color=contrastText(c.color);sel.style.fontWeight='700';}
  else{sel.style.background='';sel.style.color='';sel.style.fontWeight='';}
}
function refreshTaskCatSelect(){
  const cur=document.getElementById('tfCat').value;
  /* each option shows the category name AND its set colour */
  document.getElementById('tfCat').innerHTML=myCats().map(c=>
    `<option value="${c.id}" style="background:${c.color};color:${contrastText(c.color)};font-weight:700;">${esc(c.name)}</option>`).join('');
  if(catFilter!=='all')document.getElementById('tfCat').value=catFilter;
  else if(cur)document.getElementById('tfCat').value=cur;
  styleCatSelect();}
function onVisChange(){document.getElementById('tfGroupRow').style.display=
  document.getElementById('tfVis').value==='group'?'flex':'none';}
function saveTask(mode){
  const content=tfContent.value.trim(); if(!content){alert(t('aNeedContent'));return;}
  const vis=tfVis.value, gid=vis==='group'?tfGroup.value:null;
  if(vis==='group'&&!gid){alert(t('aNeedGroup'));return;}
  const data={catId:tfCat.value,content,visibility:vis,groupId:gid,
    pStart:tfPStart.value,pEnd:tfPEnd.value,aStart:tfAStart.value,aEnd:tfAEnd.value,
    progress:parseInt(tfProg.value)||0,memo:tfMemo.value.trim()};
  if(mode==='edit'){
    if(!editingId){alert(t('aSelEdit'));return;}
    const tk=DB.tasks.find(x=>x.id===editingId);
    if(tk.owner!==ME){alert(t('aOwnEdit'));return;}
    Object.assign(tk,data);
  }else{DB.tasks.push({id:uid(),owner:ME,status:'todo',...data});editingId=null;}
  saveDB();clearTaskForm(mode==='edit');renderTaskList();renderMainView();renderDayTasks();}
function deleteTask(){
  if(!editingId){alert(t('aSelDel'));return;}
  const tk=DB.tasks.find(x=>x.id===editingId);
  if(tk.owner!==ME){alert(t('aOwnDel'));return;}
  if(!confirm(t('aDelTask')))return;
  DB.tasks=DB.tasks.filter(x=>x.id!==editingId);editingId=null;
  saveDB();clearTaskForm();renderTaskList();renderMainView();renderDayTasks();}
function clearTaskForm(keepSel){
  tfContent.value='';tfMemo.value='';tfPStart.value='';tfPEnd.value='';tfAStart.value='';tfAEnd.value='';tfProg.value='0';
  if(!keepSel){editingId=null;renderTaskList();}}
function selectTask(id){
  const tk=DB.tasks.find(x=>x.id===id);if(!tk)return; editingId=id;
  tfCat.value=tk.catId;styleCatSelect();tfContent.value=tk.content;tfVis.value=tk.visibility;onVisChange();
  if(tk.groupId)tfGroup.value=tk.groupId;
  tfPStart.value=tk.pStart||'';tfPEnd.value=tk.pEnd||'';tfAStart.value=tk.aStart||'';tfAEnd.value=tk.aEnd||'';
  tfProg.value=tk.progress||0;tfMemo.value=tk.memo||''; renderTaskList();
  const p=document.getElementById('taskPanel');
  if(p.classList.contains('acc-collapsed')){p.classList.remove('acc-collapsed');refreshAccLabels();}}
function renderTaskList(){
  const tasks=visibleTasks(), el=document.getElementById('taskList');
  if(!tasks.length){el.innerHTML=`<div style="color:var(--ink-soft);font-size:12px;">${t('noTasks')}</div>`;return;}
  el.innerHTML=tasks.map(tk=>{
    const c=catById(tk.catId), editable=tk.owner===ME;
    const who=tk.owner!==ME?` ・ ${esc(tk.owner)}`:'';
    const range=(tk.pStart||'?')+' → '+(tk.pEnd||'?');
    return `<div class="tl-item ${editingId===tk.id?'sel':''}" ${editable?`onclick="selectTask('${tk.id}')"`:''}>
      <span class="tl-tag" style="background:${taskColor(tk)}">${c?esc(c.name):'—'}</span>
      <span class="grow">${esc(tk.content)} <span style="color:var(--ink-soft)">${range}</span></span>
      <span class="tl-vis">${tk.visibility==='group'?'👥'+groupName(tk.groupId):'👤'+t('indiv')}${who}</span>
      <span class="tl-vis">${tk.progress||0}%</span>
      ${editable?'':`<span class="tl-vis">${t('shareLabel')}</span>`}</div>`;}).join('');
}

/* =====================================================================
   Utils + boot
   ===================================================================== */
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function renderAll(){
  refreshGroupSelects();renderGroups();
  renderCategories();renderCatFilter();
  document.getElementById('newCatSwatch').style.background=palColor;
  refreshTaskCatSelect();onVisChange();
  renderMemos();renderTaskList();
  updateViewLabels();refreshAccLabels();
  renderMainView();renderDayTasks();
}

/* initial paint — defensive so the UI is never left blank/half-drawn */
function boot(){
  try{ applyTheme(THEME); }catch(e){ console.error('theme',e); }
  try{ applyStaticI18n(); }catch(e){ console.error('i18n',e); }   /* fill labels first */
  try{ applyLang(); }catch(e){ console.error('lang',e); }
  if(initFirebase()){                                   /* ---- Firebase mode ---- */
    switchAuth('login');
    FB.auth.onAuthStateChanged(function(user){
      if(FB.manual) return;                             /* manual login/logout handles itself */
      if(user){ fbEnter(user).catch(e=>{console.error(e);switchAuth('login');}); }
      else{ document.getElementById('appView').classList.add('hidden');
            document.getElementById('authView').classList.remove('hidden'); }
    });
  }else{                                                /* ---- local storage mode ---- */
    try{ if(ME&&DB.users[ME]) enterApp(ME); else switchAuth('login'); }
    catch(e){ console.error('boot',e); try{ switchAuth('login'); }catch(_){}}
  }
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();
</script>
